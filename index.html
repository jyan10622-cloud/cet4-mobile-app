<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>CET4 备考 App</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.png" />
  <link rel="stylesheet" href="./assets/css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">移动端四级备考 · 今日任务驱动 · 离线可用</p>
        <h1>CET4 四级备考</h1>
      </div>
      <button id="installBtn" class="ghost-btn hidden">安装到手机</button>
    </header>

    <main class="content">
      <section id="view-home" class="view active"></section>
      <section id="view-daily" class="view"></section>
      <section id="view-vocab" class="view"></section>
      <section id="view-practice" class="view"></section>
      <section id="view-plan" class="view"></section>
      <section id="view-profile" class="view"></section>
    </main>
  </div>

  <nav class="tabbar">
    <button class="tab active" data-view="home">首页</button>
    <button class="tab" data-view="daily">今日</button>
    <button class="tab" data-view="vocab">词汇</button>
    <button class="tab" data-view="practice">练习</button>
    <button class="tab" data-view="plan">计划</button>
    <button class="tab" data-view="profile">我的</button>
  </nav>

  <div id="toast" class="toast" aria-live="polite"></div>

  <script type="module" src="./assets/js/app.js"></script>
</body>
</html>
